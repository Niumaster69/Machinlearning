<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistic Regression - Purchase Prediction</title>
</head>
<body>
    <h1>Logistic Regression to Predict Purchase</h1>
    <p>Enter the customer data:</p>
    <form method="post">
        <label for="edad">Edad:</label>
        <input type="number" id="edad" name="edad" placeholder="Ej: 30" required><br><br>

        <label for="ingreso_mensual">Ingreso Mensual:</label>
        <input type="number" id="ingreso_mensual" name="ingreso_mensual" placeholder="Ej: 3500000" required><br><br>

        <label for="visitas_web_mes">Visitas Web al Mes:</label>
        <input type="number" id="visitas_web_mes" name="visitas_web_mes" placeholder="Ej: 10" required><br><br>

        <label for="tiempo_sitio_min">Tiempo en Sitio (min):</label>
        <input type="number" step="0.1" id="tiempo_sitio_min" name="tiempo_sitio_min" placeholder="Ej: 15.5" required><br><br>

        <label for="compras_previas">Compras Previas:</label>
        <input type="number" id="compras_previas" name="compras_previas" placeholder="Ej: 5" required><br><br>

        <label for="descuento_usado">Descuento Usado (0=No, 1=Si):</label>
        <input type="number" id="descuento_usado" name="descuento_usado" min="0" max="1" placeholder="0 o 1" required><br><br>

        <button type="submit">Predict</button>
    </form>
    <p id="result"></p>
    {% if result is not none %}
        <h2>Resultado: {% if result == 1 %}COMPRA{% else %}NO COMPRA{% endif %}</h2>
    {% endif %}
</body>
</html>
